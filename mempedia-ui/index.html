<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mempedia Graph Explorer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Mempedia</div>
      <div class="title">
        <h1>知识图谱可视化与浏览</h1>
        <p>全量数据概览 + 关系图 + 结构化视图</p>
      </div>
      <div class="controls">
        <label class="file">
          <span>选择目录</span>
          <input id="folder-input" type="file" webkitdirectory directory multiple />
        </label>
        <select id="root-select" aria-label="存储根"></select>
        <button id="load-btn">加载</button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <div class="panel">
          <h2>数据状态</h2>
          <p id="status">等待导入目录…</p>
          <div class="stats">
            <div><strong id="metric-nodes">0</strong><span>Nodes</span></div>
            <div><strong id="metric-edges">0</strong><span>Edges</span></div>
            <div><strong id="metric-versions">0</strong><span>Versions</span></div>
            <div><strong id="metric-access">0</strong><span>Access Logs</span></div>
          </div>
        </div>
        <div class="panel">
          <h2>节点检索</h2>
          <input id="node-search" type="search" placeholder="搜索 node id / title" />
          <p id="node-count">0 nodes</p>
          <div id="node-list" class="node-list"></div>
        </div>
        <div class="panel">
          <h2>关系列表</h2>
          <div id="edge-list" class="edge-list"></div>
        </div>
      </aside>

      <section class="content">
        <div class="tabs">
          <button class="tab active" data-tab="graph">Graph</button>
          <button class="tab" data-tab="node">Node</button>
          <button class="tab" data-tab="habits">Habits</button>
          <button class="tab" data-tab="patterns">Patterns</button>
          <button class="tab" data-tab="conversations">Conversations</button>
        </div>

        <div id="tab-graph" class="tab-panel active">
          <div class="graph-toolbar">
            <label>布局
              <select id="layout-select">
                <option value="force">Force</option>
                <option value="radial">Radial</option>
              </select>
            </label>
            <label>显示
              <select id="graph-scope">
                <option value="all">全部节点</option>
                <option value="selected">选中节点一跳</option>
              </select>
            </label>
            <button id="reheat-btn">重新布局</button>
          </div>
          <canvas id="graph-canvas" width="1200" height="720"></canvas>
          <div class="legend">
            <span class="dot tracked"></span> 主节点
            <span class="dot referenced"></span> 引用节点
            <span class="line"></span> 关系边
          </div>
        </div>

        <div id="tab-node" class="tab-panel">
          <div class="node-header">
            <h2 id="node-title">未选择节点</h2>
            <p id="node-meta"></p>
          </div>
          <div class="node-body">
            <div>
              <h3>正文</h3>
              <div id="node-body" class="markdown"></div>
            </div>
            <div>
              <h3>结构化字段</h3>
              <table class="kv" id="node-structured"></table>
            </div>
          </div>
          <div class="node-relations">
            <div>
              <h3>Outgoing</h3>
              <div id="node-outgoing" class="chips"></div>
            </div>
            <div>
              <h3>Incoming</h3>
              <div id="node-incoming" class="chips"></div>
            </div>
          </div>
          <div class="node-versions">
            <h3>Versions</h3>
            <ol id="version-list"></ol>
          </div>
        </div>

        <div id="tab-habits" class="tab-panel">
          <h2>用户偏好与习惯</h2>
          <div id="habits-list" class="card-list"></div>
        </div>

        <div id="tab-patterns" class="tab-panel">
          <h2>行为模式</h2>
          <div id="patterns-list" class="card-list"></div>
        </div>

        <div id="tab-conversations" class="tab-panel">
          <h2>对话原始记录</h2>
          <div class="conv-grid">
            <div>
              <h3>与节点映射</h3>
              <div id="conversation-node-label">未选择节点</div>
              <ul id="conversation-list"></ul>
            </div>
            <div>
              <h3>内容</h3>
              <pre id="conversation-detail"></pre>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
